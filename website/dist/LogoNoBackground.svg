<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" shape-rendering="geometricPrecision">
  <!-- Central starburst design with pastel yellow -->
  <g transform="translate(100,100)" fill="#FFE5B4">
    <ellipse rx="8" ry="75" transform="rotate(0)"/>
    <ellipse rx="8" ry="75" transform="rotate(30)"/>
    <ellipse rx="8" ry="75" transform="rotate(60)"/>
    <ellipse rx="8" ry="75" transform="rotate(90)"/>
    <ellipse rx="8" ry="75" transform="rotate(120)"/>
    <ellipse rx="8" ry="75" transform="rotate(150)"/>
    <ellipse rx="8" ry="75" transform="rotate(180)"/>
    <ellipse rx="8" ry="75" transform="rotate(210)"/>
    <ellipse rx="8" ry="75" transform="rotate(240)"/>
    <ellipse rx="8" ry="75" transform="rotate(270)"/>
    <ellipse rx="8" ry="75" transform="rotate(300)"/>
    <ellipse rx="8" ry="75" transform="rotate(330)"/>
    <circle r="20" fill="#FFE5B4"/>
  </g>
</svg>
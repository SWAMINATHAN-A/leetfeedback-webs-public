<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circles -->
  <circle cx="100" cy="100" r="60" fill="#3B82F6" opacity="0.1"/>
  <circle cx="300" cy="100" r="60" fill="#F59E0B" opacity="0.1"/>
  <circle cx="100" cy="300" r="60" fill="#8B5CF6" opacity="0.1"/>
  <circle cx="300" cy="300" r="60" fill="#6B7280" opacity="0.1"/>
  <!-- Phase 1: Foundation -->
  <g transform="translate(60, 60)">
    <rect x="10" y="10" width="60" height="60" rx="8" fill="#3B82F6" opacity="0.2"/>
    <path d="M25 30L35 40L55 25" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="15" y="50" width="40" height="4" rx="2" fill="#3B82F6" opacity="0.3"/>
  </g>
  <!-- Phase 2: AI & Analytics -->
  <g transform="translate(260, 60)">
    <circle cx="40" cy="40" r="30" fill="#F59E0B" opacity="0.2"/>
    <path d="M30 30L40 40L50 30M30 50L40 40L50 50" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="40" cy="40" r="5" fill="#F59E0B"/>
  </g>
  <!-- Phase 3: Visualization -->
  <g transform="translate(60, 260)">
    <rect x="10" y="40" width="8" height="20" rx="2" fill="#8B5CF6" opacity="0.7"/>
    <rect x="25" y="30" width="8" height="30" rx="2" fill="#8B5CF6" opacity="0.8"/>
    <rect x="40" y="20" width="8" height="40" rx="2" fill="#8B5CF6" opacity="0.9"/>
    <rect x="55" y="15" width="8" height="45" rx="2" fill="#8B5CF6"/>
  </g>
  <!-- Phase 4: Platform Expansion -->
  <g transform="translate(260, 260)">
    <rect x="20" y="20" width="40" height="40" rx="6" fill="#6B7280" opacity="0.2"/>
    <circle cx="30" cy="30" r="6" fill="#6B7280"/>
    <circle cx="50" cy="30" r="6" fill="#6B7280"/>
    <circle cx="30" cy="50" r="6" fill="#6B7280"/>
    <circle cx="50" cy="50" r="6" fill="#6B7280"/>
  </g>
  <!-- Connecting lines -->
  <line x1="140" y1="100" x2="260" y2="100" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="100" y1="160" x2="100" y2="240" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="300" y1="160" x2="300" y2="240" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="160" y1="300" x2="240" y2="300" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="4 4"/>
</svg>